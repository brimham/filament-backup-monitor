name: run-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.3']
        # Filament majors are pinned to a compatible Laravel/Testbench line:
        # Filament 3 caps at Laravel 12; Filament 5 needs Laravel 13.
        include:
          - filament: '3.*'
            laravel: '12.*'
            testbench: '10.*'
          - filament: '4.*'
            laravel: '12.*'
            testbench: '10.*'
          - filament: '5.*'
            laravel: '13.*'
            testbench: '11.*'

    name: P${{ matrix.php }} - Filament ${{ matrix.filament }} - L${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, intl, pcntl, pdo, sqlite, pdo_sqlite, bcmath, fileinfo
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "filament/filament:${{ matrix.filament }}" \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: List installed dependencies
        run: composer show --direct

      - name: Execute tests
        run: vendor/bin/pest
